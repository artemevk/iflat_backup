homeassistant:
  name: iFlat
#   latitude: !secret latitude_coord
#   longitude: !secret longitude_coord
#   elevation: 211
  unit_system: metric
  country: RU
  time_zone: Europe/Moscow
  packages: !include_dir_merge_named includes/packages
  
# Loads default set of integrations. Do not remove.
default_config:

# Text to speech
tts:
  - platform: google_translate

frontend:
  extra_module_url:
    - /hacsfiles/ha-yandex-icons/yandex-icons.js 

lovelace:
  resources:
    - url: /local/mini-media-player-bundle.js?v=1.16.5
      type: module

alarm_control_panel:
  - platform: manual
    name: Home Alarm
    # code: "1234"
    arming_time: 30
    delay_time: 20
    trigger_time: 4
    disarmed:
      trigger_time: 0
    armed_home:
      arming_time: 0
      delay_time: 0

automation: !include_dir_merge_list includes/automation
binary_sensor: !include includes/binary_sensor.yaml
input_boolean: !include includes/input_boolean.yaml
light: !include includes/lights.yaml
recorder: !include includes/recorder.yaml
scene: !include scenes.yaml
script: !include scripts.yaml
sensor: !include_dir_merge_list includes/sensor/
# yeelight: !include includes/yeelight.yaml

command_line:
  - sensor:
      name: CPU Temperature
      command: "cat /sys/class/thermal/thermal_zone0/temp"
      # If errors occur, make sure configuration file is encoded as UTF-8
      unit_of_measurement: "°C"
      value_template: "{{ value | multiply(0.001) | round(1) }}"

# Платформа телеграмм бота
telegram_bot:
  - platform: polling
    api_key: !secret api_token_bot
    allowed_chat_ids:
      - !secret tlg_user1_id
      - !secret tlg_user2_id
      - !secret tlg_user3_id
      - !secret tlg_user4_id
      - !secret tlg_user5_id

# Платформа телеграмм уведомлений
notify:
  - platform: telegram
    name: tlg_user1_id
    chat_id: !secret tlg_user1_id
  - platform: telegram
    name: tlg_user2_id
    chat_id: !secret tlg_user2_id
  - platform: telegram
    name: tlg_user3_id
    chat_id: !secret tlg_user3_id
  - platform: telegram
    name: tlg_user4_id
    chat_id: !secret tlg_user4_id
  - platform: telegram
    name: tlg_user5_id
    chat_id: !secret tlg_user5_id
  - platform: group 
    name: all_telegram
    services:
      - service: tlg_user1_id
      - service: tlg_user2_id
      - service: tlg_user3_id
      - service: tlg_user4_id
      - service: tlg_user5_id
  - platform: group 
    name: mariya_konstantin_ivan
    services:
      - service: tlg_user1_id
      - service: tlg_user2_id
      - service: tlg_user5_id
      
shell_command:
  push_to_github: bash /config/ha_gitpush.sh