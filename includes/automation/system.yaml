- id: Сжатие базы
  alias: 00_purge_everyday
  initial_state: true
  trigger:
    - platform: time
      at: '01:00:00'
  action:
    - service: recorder.purge
      data:
          keep_days: 60
          repack: true
          
- id: l1k3
  alias: push_HA_configuration_to_GitHub_repo
  initial_state: true
  trigger:
  # Everyday at 23:33:23 time
  - platform: time
    at: '23:33:23'
  action:
  - service: shell_command.push_to_github
  
- id: ihome_disconnected
  alias: ihome_disconnected
  initial_state: true
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.ihome
    from:
    to: 'off'
  action:
  - service: notify.tlg_user1_id
    data:
      title: "#system"
      message: "Сервер iHome не отвечает!"