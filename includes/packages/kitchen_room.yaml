kitchen_room:

  automation:
  
    - id: Сообщение о пересохших цветах
      alias: dry_flowers
      initial_state: true
      trigger:
        - platform: time_pattern
          hours: "/1"
      condition:
        alias: "Влажность < 60"
        condition: or
        conditions:
          - condition: numeric_state
            entity_id: sensor.palm_soil_moisture
            below: 60
          - condition: numeric_state
            entity_id: sensor.limon_soil_moisture
            below: 60
      action:
        - service: notify.mariya_konstantin
          data:
            message: Мы высохли, дайте попить. Ваши цветы.

    - id: Благодарность
      alias: wet_flowers
      initial_state: true
      trigger:
        - platform: numeric_state
          entity_id: sensor.palm_soil_moisture
          above: 70
        - platform: numeric_state
          entity_id: sensor.limon_soil_moisture
          above: 70
      condition:
        alias: "Влажность > 70"
        condition: and
        conditions:
          - condition: numeric_state
            entity_id: sensor.palm_soil_moisture
            above: 70
          - condition: numeric_state
            entity_id: sensor.limon_soil_moisture
            above: 70
      action:
        - service: notify.mariya_konstantin
          data:
            message: Спасибо за то, что полили нас. Ваши цветы.